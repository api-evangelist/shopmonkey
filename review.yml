  endpointsModeled:
    - GET https://api.shopmonkey.cloud/v3/location/{id} (inferred by convention; only PUT is shown on the public docs page)
    - Field-level request/response schemas in openapi/shopmonkey-openapi.yml beyond the documented Webhook resource (Order, Customer, Vehicle, Part, Appointment, User, Location, Payment, SignedInvoice) - endpoint paths are confirmed, full field lists were not exhaustively reconciled
sources:
  - url: https://shopmonkey.dev/overview
    type: Documentation
    note: States "The Shopmonkey API is based on the REST standard," version v3, base URL https://api.shopmonkey.cloud/v3; documents auth, error shape, and rate-limit headers.
  - url: https://shopmonkey.dev/quickstart
    type: Documentation
    note: REST curl example against https://api.shopmonkey.cloud/v3/auth/api_key/status with a Bearer token.
  - url: https://shopmonkey.dev/resources/order
    type: APIReference
    note: Work order endpoints and nested service/part/labor/fee/tire/subcontract/authorization/file/pdf sub-resources; order_shared signed_invoice/payment/pdf endpoints.
  - url: https://shopmonkey.dev/resources/customer
    type: APIReference
  - url: https://shopmonkey.dev/resources/vehicle
    type: APIReference
  - url: https://shopmonkey.dev/resources/part
    type: APIReference
  - url: https://shopmonkey.dev/resources/payment
    type: APIReference
  - url: https://shopmonkey.dev/resources/appointment
    type: APIReference
  - url: https://shopmonkey.dev/resources/user
    type: APIReference
  - url: https://shopmonkey.dev/resources/location
    type: APIReference
  - url: https://shopmonkey.dev/resources/webhook
    type: APIReference
  - url: https://shopmonkey.dev/eds
    type: Documentation
    note: Enterprise Data Streaming overview; confirms TLS, one-way flow, ~100-250ms typical latency, no WebSocket mentioned.
  - url: https://github.com/shopmonkeyus/eds
    type: Repository
    note: EDS server source and README; lists supported sink drivers (mysql, postgres, sqlserver, snowflake, s3, kafka, eventhub, file); no transport protocol named for the inbound subscription.
  - url: https://support.shopmonkey.io/hc/en-us/articles/38743124485780-Shopmonkey-API
    type: Documentation
    note: Support-side description confirming REST, OAuth 2.0 Bearer token auth, and access to Customers/Orders/Users/Vehicles/Inventory.
actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket (or SSE) protocol surface exists on Shopmonkey's own public
    API. No AsyncAPI document was authored. Because the original research
    premise (a documented public GraphQL API) did not hold up under direct
    review of shopmonkey.dev, this entry was built with openapi/ artifacts
    against the confirmed REST v3 surface instead of graphql/ artifacts.
