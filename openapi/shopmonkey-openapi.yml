      - name: fileId
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: deleteOrderFile
      tags: [Work Orders]
      summary: Remove a file from an Order
      description: CONFIRMED endpoint.
      responses:
        '200':
          description: Deleted.
  /order/{id}/pdf:
    parameters:
      - $ref: '#/components/parameters/Id'
    get:
      operationId: getOrderPdf
      tags: [Work Orders]
      summary: Get the Order as a PDF
