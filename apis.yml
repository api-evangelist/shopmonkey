aid: shopmonkey
url: https://raw.githubusercontent.com/api-evangelist/shopmonkey/refs/heads/main/apis.yml
name: Shopmonkey
kind: company
description: Shopmonkey is a cloud-based shop management platform for auto repair,
  tire, and powersports shops, covering estimates, work orders, customer
  communication, parts/inventory, scheduling, invoicing, and payments.
  Shopmonkey publishes a documented public API at developer.shopmonkey.io /
  shopmonkey.dev (base https://api.shopmonkey.cloud/v3). Despite being
  commonly assumed to be GraphQL, the confirmed public API is REST/JSON
  (v3), authenticated with a Bearer API key, covering 50+ resources -
  Work Orders, Customers, Vehicles, Parts/Inventory, Invoices/Payments,
  Appointments, Employees (Users), Locations, and Webhooks. No GraphQL
  endpoint, schema, or query/mutation language is documented anywhere on
  Shopmonkey's developer site. Enterprise accounts can also run the
  open-source Enterprise Data Streaming (EDS) server for near-real-time
  change data capture into a customer-controlled destination.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Auto Repair
- Shop Management
- Field Service
- REST
- Not GraphQL
