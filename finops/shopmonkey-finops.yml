meters:
- name: shop_subscription
  description: Flat monthly per-shop subscription fee (Basic/Clever/Genius) that
    includes REST API and webhook access.
  unit: shops
  aggregation: sum
  dimensions:
  - account
  - plan
- name: payment_processing_volume
  description: Dollar volume of customer payments processed through Shopmonkey's
    integrated payments, billed at a per-transaction rate that improves at higher
    plan tiers.
  unit: usd
  aggregation: sum
  dimensions:
  - account
  - plan
- name: multi_shop_contract
  description: Custom-quoted annual/contract charge for Multi-Shop and Enterprise
    Data Streaming (EDS) customers.
  unit: contracts
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Reconcile the monthly per-shop subscription invoice against active
    locations/shops; review integrated-payment processing statements separately.
- name: Allocation
  description: Tag API keys and webhook destinations per integration/team so shop
    or franchise cost centers can be attributed.
- name: Optimization
  description: Consolidate multi-location shops onto the Multi-Shop tier once the
    per-shop subscription cost exceeds a custom quote; use integrated payments at
    a higher tier (Genius) to lower processing rates if volume justifies the
    subscription upgrade.
- name: Accountability
  description: Assign an owner per shop location for the Shopmonkey subscription
    and API-key lifecycle; review payment-processing statements monthly.
