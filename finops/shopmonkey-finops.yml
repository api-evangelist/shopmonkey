billingModel:
  pricingCategory: Flat-Rate (per shop) + Usage (payments)
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Subscription
  - Usage
  - Purchase
focusColumns:
  ServiceName: Shopmonkey
  ServiceCategory: Vertical SaaS - Auto Repair Shop Management
  ProviderName: Shopmonkey
  PublisherName: Shopmonkey
  InvoiceIssuerName: Shopmonkey
  BillingCurrency: USD
