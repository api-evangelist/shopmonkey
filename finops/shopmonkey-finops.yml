description: >-
  FinOps view of Shopmonkey spend. Shopmonkey bills a flat monthly
  per-shop subscription fee (Basic/Clever/Genius) that includes REST API and
  webhook access, plus payment-processing fees on transactions run through
  Shopmonkey's integrated payments. Multi-location and Enterprise Data
  Streaming (EDS) are custom-quoted contract line items. There is no
  separate per-call or per-token API meter to track; API cost governance is
  really subscription-tier and payment-processing governance.
notes: >-
  Per-transaction payment-processing rates were not independently reconciled
  (they vary by tier - Genius advertises "lower payment rates" - and by card
  type); verify current rates with a Shopmonkey account rep.
sources:
- https://www.shopmonkey.io/pricing
- https://shopmonkey.dev/overview
